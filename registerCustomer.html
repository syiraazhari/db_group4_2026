<!DOCTYPE html>
<html>
<head>
	<title> Register An Account </title>
	<link rel="stylesheet" href="booking.css">
</head>

<div class="booking-container">
<body>
	<form action="registerprocess.php" method="POST">
	<div class="container">
		<h1><b> Registration </b></h1>
		<p style="color:red"><i> *Please register to login </i></p>
		<br>
		
		<p>
		<label> Username: </label>
		<input type="text" name="username" required>
		</p>
		
		<p>
		<label> First Name: </label>
		<input type="text" name="fname" required>
		</p>
		
		<p>
		<label> Last Name: </label>
		<input type="text" name="lname" required>
		</p>
		
		<p>
		<label for="location-select">Choose a location:</label>
		<select name="locations" id="location-select">
		<option value="">--Please choose an option--</option>
    
			<optgroup label="Malaysia">
				<option value="johor-bahru">Johor Bahru, Johor</option>
				<option value="alor-setar">Alor Setar, Kedah</option>
				<option value="kota-bharu">Kota Bharu, Kelantan</option>
				<option value="bandaraya-melaka">Bandaraya Melaka, Melaka</option>
				<option value="seremban">Seremban, Negeri Sembilan</option>
				<option value="kuantan">Kuantan, Pahang</option>
				<option value="ipoh">Ipoh, Perak</option>
				<option value="kangar">Kangar, Perlis</option>
				<option value="george-town">George Town, Pulau Pinang</option>
				<option value="shah-alam">Shah Alam, Selangor</option>
				<option value="kuala-terengganu">Kuala Terengganu, Terengganu</option>
				<option value="kota-kinabalu">Kota Kinabalu, Sabah</option>
				<option value="kuching">Kuching, Sarawak</option>
				<option value="kuala-lumpur">Kuala Lumpur (Wilayah Persekutuan)</option>
			</optgroup>
		</select>
		</p>
		
		<p>
		<label> Birthday: </label>
		<input type="date" name="birthday">
		</p>
		
		<p>
		<label for="email">Email Address:</label>
		<input type="email" name="email" placeholder="example@domain.com">
		</p>
		
		<p>
		<label for="password"> Password: </label>
		<input type="password" name="passw" placeholder="Abc@123">
		</p>
	</form>
	</div>
</div>
</body>
</html>
